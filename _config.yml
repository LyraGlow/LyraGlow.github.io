# Site settings
title: LyraGlow
description: '分享我的技术探索与生活感悟' # this means to ignore newlines until "baseurl:"
permalink: ':title:output_ext'
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://lyraglow.github.io" # the base hostname & protocol for your site, e.g. http://example.com
logo: "/assets/img/branding/MPP-logo-full.svg"
logo-icon: "/assets/img/branding/MPP-logo.svg"
logo-icon-SEO: "/assets/img/branding/MPP-logo.png" # must be a non SVG file

# Night/Dark mode
# Default mode is "auto", "auto" is for auto nightshift
# (19:00 - 07:00), "manual" is for manual toggle, and
# "on/off" is for default on/off.
#
# Whatever the user's choice is, it will supersede the
# default setting of the site and be kept during the
# visit (session). Only the dark mode setting is "manual",
# it will be always kept on every visit (i.e. no matter
# the browser is closed or not)
night_mode: "auto"

logo-dark: "/assets/img/branding/MPP-logo-full.svg"
highlight_theme: syntax-base16.monokai.dark # select a dark theme for the code highlighter if needed

# Author settings
author: 黄建豪 # add your name
author-pic: Myself_Neon_grey.jpg
about-author: 学生，专注于深度学习的编码爱好者，喜欢从原理出发动手实现模型，在实践中不断打磨对算法与系统的理解。

